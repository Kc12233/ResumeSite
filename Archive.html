      height: 1px;

      margin: 40px 0;
    }

    /* Content */
    h1 {
      font-size: 22px;
      margin-bottom: 25px;
    }

    p {
      margin-bottom: 20px;
      font-size: 15px;
    }

    .highlight {
      text-decoration: line-through;
      opacity: 0.5;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 60px;
      color: #888;
      font-size: 14px;
    }

    .socials a {
      margin: 0 8px;
      font-size: 18px;
